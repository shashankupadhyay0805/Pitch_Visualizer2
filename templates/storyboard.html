<html>
<head>
<title>Storyboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.panel{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.panel img{
width:100%;
height:250px;
object-fit:cover;
}

.panel-content{
padding:15px;
}

.prompt{
font-size:12px;
color:gray;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Generated Storyboard</h1>

<div class="grid">

{% for scene in scenes %}

<div class="panel">

<img src="/{{scene.image}}">

<div class="panel-content">

<p>{{scene.text}}</p>

<p class="prompt">
Prompt: {{scene.prompt}}
</p>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
